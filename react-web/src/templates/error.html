<!Doctype html>
<html class="no-js" lang=""
      xmlns:th="http://www.thymeleaf.org">
<object th:insert="~{layouts/partials/header.html}"></object>
<body>
<!-- Add your site or application content here -->
<div class="body-container test">
    <div class="container ">
        <div class="row align-items-center cvh-100 pt-5 pb-5">
            <div class="col-12 col-md-6">

                <h1 class="site-color fnt-80">[[${status}]]</h1>

                <p th:if="${timestamp}" th:text="'Timestamp: ' + ${timestamp}">Timestamp</p>

                <p th:if="${error} AND ${error} != 'None' " th:text="'Error: ' + ${error}">Error</p>

                <p th:if="${code}" th:text="'Code: ' + ${code}">Code</p>

                <p th:if="${description}" th:text="'Message: ' + ${description}">Message</p>

                <p th:if="${message} AND ${message} != 'No message available' AND ${error} != ${message} AND !${description}"
                   th:text="'Message: ' + ${message}">Message</p>

                <p th:if="${exception}" th:text="'Exception: ' + ${exception}">Exception</p>

                <p th:if="${path}" th:text="'Path: ' + ${path}">Path</p>

                <p th:if="${userName}" th:text="'Executed by: ' + ${userName}">Executed by</p>

                <p th:if="${version}" th:text="'V. ' + ${version}">Version</p>

                <a th:href="@{/}" class="main-btn mt-2 pt-2 pb-2 d-inline-block">Home</a> or
                <a th:href="@{/login}" class="main-btn mt-2 pt-2 pb-2 d-inline-block">Login</a>

            </div>
            <div class="col-12 col-md-6 text-center">
                <a th:href="@{/}" class="not-found-logo m-auto ">
                    <img th:src="@{/img/logo-sidebar.svg}" class="mt-5 mb-5" alt="bkash">
                </a>
            </div>
        </div>
    </div>
</div>

</body>
<object th:insert="~{layouts/partials/footer.html}  "></object>
</html>
